<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0c1120"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MedLocate"/>
<title>MedLocate</title>
<style>
:root{
  --bg:#0c1120;--green:#10b981;--gl:#ecfdf5;--gm:#d1fae5;--gd:#065f46;
  --tx:#0f172a;--t2:#475569;--t3:#94a3b8;--bd:#e2e8f0;--red:#ef4444;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:system-ui,-apple-system,sans-serif;color:var(--tx)}
input,button,textarea{font-family:inherit}
::-webkit-scrollbar{display:none}
body{display:flex;align-items:center;justify-content:center}

/* ── App shell ── */
#app{
  width:100%;max-width:430px;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  background:#f1f5f9;position:relative;overflow:hidden;
}

/* ── Header ── */
.hdr{background:linear-gradient(160deg,#0c1120,#0f2744);padding:calc(var(--st)+14px) 18px 14px;flex-shrink:0}
.eye{color:var(--green);font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:2px}
.htit{color:#f1f5f9;font-size:20px;font-weight:300;letter-spacing:-.3px}
.hsub{color:#64748b;font-size:11px;margin-top:2px}
.chips{display:flex;gap:7px;margin-top:10px}
.chip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:5px 11px;text-align:center}
.chipv{color:var(--green);font-size:16px;font-weight:700;line-height:1}
.chipl{color:#64748b;font-size:9px;text-transform:uppercase;letter-spacing:1px}

/* ── Search bar ── */
.sbar{background:linear-gradient(160deg,#0c1120,#0f2744);padding:0 14px 14px;display:flex;gap:8px;flex-shrink:0}
.sw{flex:1;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:9px 12px;display:flex;align-items:center;gap:7px;transition:border-color .2s;min-width:0}
.sw:focus-within{border-color:rgba(16,185,129,.5)}
.sw input{flex:1;background:transparent;border:none;outline:none;color:#f1f5f9;font-size:14px;min-width:0}
.sfnd{background:var(--green);color:#fff;border:none;border-radius:12px;padding:9px 14px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.sfnd:active{transform:scale(.96)}

/* ── Scroll ── */
.scr{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px;-webkit-overflow-scrolling:touch}

/* ── Item cards ── */
.card{background:#fff;border-radius:14px;padding:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px;border:1.5px solid var(--bd);cursor:pointer;transition:transform .1s,border-color .2s,background .1s;position:relative;overflow:hidden}
.card:active{transform:scale(.98);background:var(--gl)}
.card.hit{border-color:var(--green);background:var(--gl);animation:pulse 1s ease 2}
.cth{width:50px;height:50px;border-radius:8px;flex-shrink:0;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
.cth img{width:100%;height:100%;object-fit:cover}
.ci{flex:1;min-width:0}
.cn{font-size:13px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.cd{font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.cl{font-size:11px;color:var(--green);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cbadge{position:absolute;top:6px;right:6px;background:var(--green);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px}

/* ── Section label ── */
.slb{color:var(--t3);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding:0 1px}

/* ── Empty states ── */
.emp{text-align:center;padding:40px 20px;animation:fup .4s ease}
.eic{font-size:48px;margin-bottom:12px}
.eti{font-size:18px;font-weight:600;color:var(--tx);margin-bottom:7px}
.etx{font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:20px}
.ebt{background:var(--bg);color:var(--green);border:none;border-radius:12px;padding:11px 22px;font-size:13px;font-weight:700;cursor:pointer}

/* ── Drop zone ── */
.dz{background:linear-gradient(135deg,var(--gl),var(--gm));border:2px dashed var(--green);border-radius:16px;padding:28px 18px;text-align:center;cursor:pointer;margin-bottom:11px}
.dz:active{opacity:.85}

/* ── Tips ── */
.tips{background:#fff;border-radius:12px;padding:12px 14px;border:1px solid var(--bd);margin-bottom:12px}
.tip{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--t2);margin-bottom:5px}
.tip:last-child{margin-bottom:0}
.tdot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}

/* ── Photo row ── */
.prow{background:#fff;border-radius:12px;padding:9px 11px;margin-bottom:7px;display:flex;align-items:center;gap:10px;cursor:pointer;border:1px solid var(--bd)}
.prow:active{background:var(--gl)}
.prow img{width:42px;height:42px;border-radius:7px;object-fit:cover;flex-shrink:0}
.prow-info{flex:1;min-width:0}
.prow-name{font-size:13px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prow-meta{font-size:11px;color:var(--t3)}

/* ── Progress ── */
.prg{background:#fff;border-radius:16px;padding:30px 20px;text-align:center}
.pspin{font-size:38px;display:inline-block;animation:spin 1.4s linear infinite;margin-bottom:12px}

/* ── Gallery ── */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.gc{border-radius:12px;overflow:hidden;aspect-ratio:1;position:relative;cursor:pointer;background:var(--bd)}
.gc:active{opacity:.85}
.gc img{width:100%;height:100%;object-fit:cover}
.gol{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.72));padding:18px 8px 8px}
.glb{color:#fff;font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gcn{color:var(--green);font-size:9px}

/* ── Loader ── */
.dots{display:flex;justify-content:center;gap:7px;margin-bottom:12px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:bnc .8s ease infinite alternate}

/* ── Nav ── */
#nav{background:#fff;border-top:1px solid var(--bd);display:flex;padding:6px 0 calc(var(--sb)+6px);flex-shrink:0;position:relative}
.nb{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nb:active{transform:scale(.88)}
.ndot{width:3px;height:3px;border-radius:50%;background:var(--green);margin-top:1px;display:none}
/* Watermark in nav */
#wm{position:absolute;right:8px;bottom:calc(var(--sb)+6px);font-size:8px;color:#cbd5e1;letter-spacing:.5px;pointer-events:none;line-height:1}

/* ── Modal ── */
.mback{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;z-index:100;backdrop-filter:blur(4px);animation:fi .2s ease}
.msh{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:92%;overflow-y:auto;animation:su .26s cubic-bezier(.34,1.56,.64,1);padding-bottom:calc(var(--sb)+16px)}
.mhnd{width:32px;height:4px;background:var(--bd);border-radius:99px;margin:10px auto 0}

/* Photo-with-highlight hero */
.mhro{position:relative;background:#f1f5f9;overflow:hidden;margin-top:7px;flex-shrink:0}
.mhro img.shelf-img{width:100%;max-height:220px;object-fit:contain;display:block;background:#1a1a2e}
.mhro .movl{position:absolute;inset:0;background:linear-gradient(transparent 60%,rgba(0,0,0,.4));pointer-events:none}
.mhro .ph-box{position:absolute;border:2.5px solid #facc15;border-radius:6px;background:rgba(250,204,21,.15);pointer-events:none;transition:all .3s}
.mhro .ph-label{position:absolute;background:#facc15;color:#1a1a00;font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.mcls{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.45);border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:14px;z-index:2}

.mbd{padding:14px 16px}
.mbdg{display:inline-flex;align-items:center;background:var(--gl);color:#059669;font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.mnm{font-size:19px;font-weight:700;color:var(--tx);margin-bottom:4px;word-break:break-word}
.mds{font-size:12px;color:var(--t2);line-height:1.55;margin-bottom:12px}
.lc{background:linear-gradient(135deg,var(--gl),var(--gm));border-radius:12px;padding:12px 14px;border:1px solid #a7f3d0;margin-bottom:12px}
.lcl{color:var(--gd);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.lcv{font-size:14px;color:var(--tx);font-weight:700;margin-bottom:2px;word-break:break-word}
.lcp{font-size:10px;color:#6b7280}
.dlb{width:100%;background:none;border:1px solid #fca5a5;color:var(--red);border-radius:12px;padding:10px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px}
.dlb:active{background:#fef2f2}
.mit{background:#f8fafc;border-radius:10px;padding:9px 12px;margin-bottom:6px;cursor:pointer;border:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.mit:active{background:var(--gl)}

/* Edit form */
.elbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.einp{width:100%;background:#f8fafc;border:1.5px solid var(--bd);border-radius:9px;padding:9px 11px;font-size:13px;color:var(--tx);outline:none;margin-bottom:10px}
.einp:focus{border-color:var(--green)}
.sbtn{width:100%;background:var(--green);color:#fff;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:7px}
.sbtn:active{background:#059669}
.cbtn{width:100%;background:none;border:1px solid var(--bd);color:var(--t2);border-radius:12px;padding:11px;font-size:13px;cursor:pointer}

/* API key screen */
#aks{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:28px 24px;display:none}
#aks.show{display:flex}
.akw{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:9px;margin-bottom:9px}
.akw:focus-within{border-color:rgba(16,185,129,.5)}
.akw input{flex:1;background:transparent;border:none;outline:none;color:#f1f5f9;font-size:13px;font-family:monospace;letter-spacing:.8px;min-width:0}
.aksv{width:100%;background:var(--green);color:#fff;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer}
.aksv:active{background:#059669}

/* Animations */
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes bnc{from{transform:translateY(0)}to{transform:translateY(-6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}50%{box-shadow:0 0 0 8px rgba(16,185,129,0)}}

/* Raw box */
.rawbox{background:#0c1120;border-radius:10px;padding:10px;margin-bottom:10px}
.rawtxt{color:var(--green);font-size:9px;font-family:monospace;line-height:1.5;white-space:pre-wrap;word-break:break-all;max-height:120px;overflow-y:auto}

@media(min-width:500px){
  body{background:#060b14}
  #app{border-radius:38px;height:92vh;max-height:860px;box-shadow:0 0 0 1px #1e293b,0 40px 80px rgba(0,0,0,.7)}
}
</style>
</head>
<body>
<div id="app">

  <!-- API Key Screen -->
  <div id="aks">
    <div style="font-size:50px;margin-bottom:12px">💊</div>
    <div style="font-size:22px;font-weight:300;color:#f1f5f9;margin-bottom:4px">MedLocate</div>
    <div style="font-size:12px;color:#64748b;text-align:center;line-height:1.6;margin-bottom:22px">
      Enter your FREE Gemini API key.<br/>Saved permanently on this device.
    </div>
    <div class="akw">
      <span style="color:#64748b;font-size:14px">🔑</span>
      <input type="password" id="aki" placeholder="AIzaSy…" autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter')saveKey()"/>
      <button onclick="toggleVis()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:14px;padding:0;flex-shrink:0">👁</button>
    </div>
    <button class="aksv" onclick="saveKey()">Save & Continue →</button>
    <div id="ake" style="color:var(--red);font-size:11px;text-align:center;margin-top:7px;min-height:14px"></div>
    <div style="font-size:10px;color:#475569;text-align:center;line-height:1.6;margin-top:12px">
      Get free key → <a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--green);text-decoration:none">aistudio.google.com/apikey</a>
    </div>
    <button id="akskip" onclick="skipKey()" style="display:none;background:none;border:none;color:#475569;font-size:11px;cursor:pointer;margin-top:14px;text-decoration:underline">Use existing key</button>
  </div>

  <!-- Search Tab -->
  <div id="ps" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <div class="hdr">
      <div class="eye">✚ MedLocate</div>
      <div class="htit">Find Medicine</div>
      <div class="chips">
        <div class="chip"><div class="chipv" id="si">0</div><div class="chipl">Items</div></div>
        <div class="chip"><div class="chipv" id="sp">0</div><div class="chipl">Photos</div></div>
        <div style="flex:1"></div>
        <button onclick="showChangeKey()" style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:5px 10px;color:#94a3b8;font-size:10px;cursor:pointer">🔑 Key</button>
      </div>
    </div>
    <div class="sbar">
      <div class="sw">
        <span style="color:#64748b;font-size:14px;flex-shrink:0">🔍</span>
        <input type="text" id="sq" placeholder="Medicine name, brand, symptom…" onkeydown="if(event.key==='Enter')doSearch()"/>
        <button id="xb" onclick="clrSearch()" style="display:none;background:none;border:none;color:#64748b;cursor:pointer;font-size:13px;flex-shrink:0">✕</button>
      </div>
      <button class="sfnd" onclick="doSearch()">Find</button>
    </div>
    <div class="scr" id="sa"></div>
  </div>

  <!-- Upload Tab -->
  <div id="pu" style="flex:1;display:none;flex-direction:column;overflow:hidden">
    <div class="hdr">
      <div class="eye">✚ MedLocate</div>
      <div class="htit">Add Photos</div>
      <div class="hsub">AI reads every medicine label</div>
    </div>
    <div class="scr" id="ua"></div>
  </div>

  <!-- Gallery Tab -->
  <div id="pg" style="flex:1;display:none;flex-direction:column;overflow:hidden">
    <div class="hdr">
      <div class="eye">✚ MedLocate</div>
      <div class="htit">Gallery</div>
      <div class="hsub" id="gs">0 photos</div>
    </div>
    <div class="scr" id="ga"></div>
  </div>

  <!-- Nav -->
  <nav id="nav">
    <button class="nb" id="n0" onclick="tab('s')">
      <span style="font-size:20px">🔍</span>
      <span id="l0" style="font-size:10px;color:var(--green);font-weight:700">Search</span>
      <span class="ndot" id="d0" style="display:block"></span>
    </button>
    <button class="nb" id="n1" onclick="tab('u')">
      <span style="font-size:20px">📷</span>
      <span id="l1" style="font-size:10px;color:var(--t3)">Upload</span>
      <span class="ndot" id="d1"></span>
    </button>
    <button class="nb" id="n2" onclick="tab('g')">
      <span style="font-size:20px">🗂️</span>
      <span id="l2" style="font-size:10px;color:var(--t3)">Gallery</span>
      <span class="ndot" id="d2"></span>
    </button>
    <div id="wm">by Mirza Irfan</div>
  </nav>
</div>

<div id="mod"></div>
<input type="file" id="fi" accept="image/*" multiple style="display:none" onchange="onFiles(this)"/>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let items  = JSON.parse(localStorage.getItem('ml_i') || '[]');
let photos = JSON.parse(localStorage.getItem('ml_p') || '[]');
let sr = null;

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  // Check if server already has key saved
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    if (d.hasKey) { boot(); return; }
  } catch(e) {
    document.getElementById('ake').textContent = '⚠ Cannot reach server — is it running?';
  }
  // No key on server — check if we have one in localStorage to pre-fill
  const saved = localStorage.getItem('ml_gemini_key');
  if (saved) {
    document.getElementById('aki').value = saved;
    document.getElementById('akskip').style.display = 'block';
  }
  document.getElementById('aks').classList.add('show');
});

function boot() { stats(); rS(); rU(); rG(); }

// ── API Key ───────────────────────────────────────────────────────────────────
function toggleVis() {
  const i = document.getElementById('aki');
  i.type = i.type === 'password' ? 'text' : 'password';
}
function showChangeKey() {
  const saved = localStorage.getItem('ml_gemini_key') || '';
  document.getElementById('aki').value = saved;
  document.getElementById('akskip').style.display = saved ? 'block' : 'none';
  document.getElementById('aks').classList.add('show');
}
function skipKey() {
  document.getElementById('aks').classList.remove('show');
  boot();
}
async function saveKey() {
  const k = document.getElementById('aki').value.trim();
  const e = document.getElementById('ake');
  if (k.length < 20) { e.textContent = 'Key looks too short'; return; }
  e.textContent = 'Saving…';
  try {
    const r = await fetch('/api/key', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({key:k})
    });
    const d = await r.json();
    if (d.error) { e.textContent = '❌ '+d.error; return; }
    localStorage.setItem('ml_gemini_key', k); // also save locally for pre-fill next time
    document.getElementById('aks').classList.remove('show');
    boot();
  } catch(ex) { e.textContent = '❌ '+ex.message; }
}

// ── Persistence ───────────────────────────────────────────────────────────────
function persist() {
  localStorage.setItem('ml_i', JSON.stringify(items));
  localStorage.setItem('ml_p', JSON.stringify(photos));
}
function stats() {
  document.getElementById('si').textContent = items.length;
  document.getElementById('sp').textContent = photos.length;
  document.getElementById('gs').textContent = photos.length+' photo'+(photos.length!==1?'s':'')+' · '+items.length+' items';
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function tab(t) {
  const map = {s:['ps','l0','d0'], u:['pu','l1','d1'], g:['pg','l2','d2']};
  Object.entries(map).forEach(([id,[pg,lb,dt]])=>{
    const on = id===t;
    document.getElementById(pg).style.display = on?'flex':'none';
    document.getElementById(lb).style.color = on?'var(--green)':'var(--t3)';
    document.getElementById(lb).style.fontWeight = on?'700':'400';
    document.getElementById(dt).style.display = on?'block':'none';
  });
  if(t==='u') rU();
  if(t==='g') rG();
}

// ── Search ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('sq').addEventListener('input', function(){
    document.getElementById('xb').style.display = this.value?'block':'none';
    if(!this.value){ sr=null; rS(); }
  });
});
function clrSearch(){
  document.getElementById('sq').value='';
  document.getElementById('xb').style.display='none';
  sr=null; rS();
}
async function doSearch(){
  const q=document.getElementById('sq').value.trim(); if(!q)return;
  sr='loading'; rS();
  try{
    const prompt=`Inventory: ${JSON.stringify(items.map(i=>({id:i.id,name:i.name,description:i.description})))}\n\nSearch: "${q}"\n\nReturn ONLY a JSON array of matching item IDs (match brand names, generics, symptoms, drug class). No markdown:\n["id1","id2"]\nReturn [] if nothing matches.`;
    const txt = await gemini(prompt);
    const ids = JSON.parse(txt.replace(/```json|```/g,'').trim());
    sr = items.filter(i=>ids.includes(i.id));
  }catch(e){ sr=[]; }
  rS();
}
function rS(){
  const el=document.getElementById('sa');
  if(sr===null){
    if(!items.length){
      el.innerHTML=emp('🏪','Store is empty','Upload photos of your shelves — AI reads every medicine label.','📷 Add Photos',"tab('u')");
    }else{
      el.innerHTML=`<div style="animation:fup .3s ease"><div class="slb">Recently Added</div>${items.slice(-6).reverse().map(it=>cH(it)).join('')}</div>`;
    }
  }else if(sr==='loading'){
    el.innerHTML=`<div style="text-align:center;padding:50px 0"><div class="dots">${[0,1,2].map(i=>`<div class="dot" style="animation-delay:${i*.15}s"></div>`).join('')}</div><div style="color:var(--t3);font-size:13px">Searching…</div></div>`;
  }else if(!sr.length){
    el.innerHTML=emp('🔍','Not found',`Nothing matched "<b>${esc(document.getElementById('sq').value)}</b>".<br/>Try another name or upload more photos.`);
  }else{
    const q=esc(document.getElementById('sq').value);
    el.innerHTML=`<div style="animation:fup .3s ease"><div class="slb">${sr.length} result${sr.length!==1?'s':''} for "${q}"</div>${sr.map((it,i)=>cH(it,i+1)).join('')}</div>`;
    // Pulse highlight each result card
    setTimeout(()=>{ el.querySelectorAll('.card').forEach((c,i)=>{ setTimeout(()=>c.classList.add('hit'),i*120); }); },80);
  }
}
function cH(it, num){
  const t=it.photoDataUrl?`<div class="cth"><img src="${it.photoDataUrl}"/></div>`:`<div class="cth">💊</div>`;
  const badge=num?`<div class="cbadge">#${num}</div>`:'';
  return `<div class="card" onclick="opIt('${it.id}')">${t}<div class="ci"><div class="cn">${esc(it.name)}</div><div class="cd">${esc(it.description)}</div><div class="cl">📍 ${esc(it.location)}</div></div>${badge}</div>`;
}

// ── Upload ────────────────────────────────────────────────────────────────────
function rU(){
  document.getElementById('ua').innerHTML=`
    <div class="dz" onclick="document.getElementById('fi').click()">
      <div style="font-size:32px;margin-bottom:8px">📷</div>
      <div style="font-size:14px;font-weight:700;color:var(--gd);margin-bottom:3px">Upload shelf photos</div>
      <div style="font-size:11px;color:#6b7280">Tap to choose · Multiple files OK</div>
    </div>
    <div class="tips">
      <div class="tip"><span class="tdot"></span>Labels facing camera, good lighting</div>
      <div class="tip"><span class="tdot"></span>One shelf section per photo</div>
      <div class="tip"><span class="tdot"></span>AI reads every printed label</div>
    </div>
    ${photos.length?`<div class="slb">${photos.length} indexed photo${photos.length!==1?'s':''}</div>
    ${photos.slice().reverse().map(p=>`<div class="prow" onclick="opPh('${p.id}')">

      <span style="color:#d1d5db;font-size:16px">›</span></div>`).join('')}`:''}`;
}

async function onFiles(input){
  const files=Array.from(input.files||[]); if(!files.length)return; input.value='';
  const el=document.getElementById('ua');
  for(let i=0;i<files.length;i++){
    const file=files[i];
    el.innerHTML=`<div class="prg">
      <div class="pspin">⚙️</div>
      <div style="font-size:17px;font-weight:600;color:var(--tx);margin-bottom:6px">Analyzing${files.length>1?' '+(i+1)+'/'+files.length:''}</div>
      <div id="ps2" style="font-size:12px;color:var(--t2);margin-bottom:16px">Compressing image…</div>
      <div style="background:var(--bd);border-radius:99px;height:5px;overflow:hidden">
        <div id="pf" style="height:100%;background:linear-gradient(90deg,var(--green),#34d399);border-radius:99px;transition:width .4s;width:10%"></div>
      </div></div>`;
    try{
      const {b64,dataUrl}=await compress(file);
      setP('Sending to Gemini AI…',40);
      const photoId=`ph_${Date.now()}_${i}`;
      const label=file.name.replace(/\.[^.]+$/,'');

      const prompt=`You are a pharmacy inventory scanner. Examine this shelf photo carefully.

For each medicine box, bottle, strip, or packet visible:
- "name": SHORT brand name + strength only. Use what's printed BIG on the box. E.g. "Polyclav 200mg/5ml", "Clavam BID 125mg", "Dolo 650", "Crocin 500mg". Do NOT use long generic chemical names.
- "description": One short phrase. E.g. "Antibiotic syrup", "Fever & pain tablet"  
- "location": Precise shelf position using GRID format. Describe row from top (Top/Middle/Bottom shelf) and column (Left/Center/Right). E.g. "Top shelf, far left", "Middle shelf, 3rd from left", "Bottom shelf, right side"
- "x": approximate horizontal % position of item center in image (0=left edge, 100=right edge)
- "y": approximate vertical % position of item center in image (0=top, 100=bottom)
- "w": approximate width % of item in image (e.g. 15 means item takes 15% of image width)
- "h": approximate height % of item in image

Return ONLY a JSON array, no markdown:
[{"name":"Polyclav 200mg/5ml","description":"Antibiotic syrup","location":"Middle shelf, far left","x":12,"y":45,"w":14,"h":25}]

Return [] only if no medicine packaging is visible.`;

      const rawText=await geminiVision(b64,prompt);
      if(!rawText) throw new Error('Empty response from Gemini');
      const found=parseItems(rawText);
      setP(`✓ Found ${found.length} item${found.length!==1?'s':''}`,100);

      photos.push({id:photoId,label,dataUrl,itemCount:found.length,addedAt:new Date().toISOString()});
      found.forEach(p=>{
        const id=`it_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
        items.push({
          id, name:p.name, description:p.description||'', location:p.location||'shelf',
          x:p.x||null, y:p.y||null, w:p.w||null, h:p.h||null,
          photoId, photoLabel:label, photoDataUrl:dataUrl, addedAt:new Date().toISOString()
        });
      });
      persist(); stats(); await sleep(300);

      el.innerHTML=`
        <div style="background:#fff;border-radius:14px;padding:12px;margin-bottom:10px;border:1px solid var(--bd)">
          <img src="${dataUrl}" style="width:100%;border-radius:8px;max-height:140px;object-fit:cover;margin-bottom:8px"/>
          <div style="font-size:13px;font-weight:700;color:${found.length?'var(--tx)':'var(--red)'};margin-bottom:5px">
            ${found.length?'✅ Found '+found.length+' item'+(found.length!==1?'s':''):'⚠️ 0 items detected'}
          </div>
          ${found.map(d=>`<div style="font-size:11px;padding:3px 0;border-bottom:1px solid #f1f5f9;color:var(--green)">💊 <b>${esc(d.name)}</b> <span style="color:var(--t2)">— ${esc(d.location)}</span></div>`).join('')}
        </div>
        <div class="rawbox"><div style="color:#475569;font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Gemini response</div><div class="rawtxt">${esc(rawText)}</div></div>
        <button onclick="rU()" style="width:100%;background:#0f172a;color:#f1f5f9;border:none;border-radius:12px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:7px">← Upload Another</button>
        <button onclick="tab('s')" style="width:100%;background:var(--green);color:#fff;border:none;border-radius:12px;padding:11px;font-size:13px;font-weight:700;cursor:pointer">Go to Search →</button>`;
    }catch(e){
      el.innerHTML=`<div style="background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid #fca5a5;text-align:center">
        <div style="font-size:32px;margin-bottom:8px">❌</div>
        <div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:6px">Error</div>
        <div style="font-size:10px;color:#64748b;font-family:monospace;background:#f8fafc;border-radius:7px;padding:8px;text-align:left;word-break:break-all;line-height:1.5">${esc(e.message||String(e))}</div>
      </div>
      <button onclick="rU()" style="width:100%;background:#0f172a;color:#f1f5f9;border:none;border-radius:12px;padding:11px;font-size:13px;font-weight:700;cursor:pointer">Try Again</button>`;
    }
  }
}
function setP(t,w){ const s=document.getElementById('ps2'),f=document.getElementById('pf'); if(s)s.textContent=t; if(f)f.style.width=w+'%'; }

// ── Gallery ───────────────────────────────────────────────────────────────────
function rG(){
  stats(); const el=document.getElementById('ga');
  if(!photos.length){ el.innerHTML=emp('🖼️','No photos yet','Upload shelf photos to build your gallery.','Add Photos',"tab('u')"); return; }
  el.innerHTML=`<div class="pgrid">${photos.slice().reverse().map(p=>`
    <div class="gc" onclick="opPh('${p.id}')"><img src="${p.dataUrl}" alt=""/>
      <div class="gol"><div class="glb">${esc(p.label)}</div><div class="gcn">${p.itemCount} items</div></div>
    </div>`).join('')}</div>`;
}

// ── Item Modal ────────────────────────────────────────────────────────────────
function opIt(id, editMode){
  const it=items.find(i=>i.id===id); if(!it)return;

  // Build photo hero with yellow highlight box on item
  let heroHtml;
  if(it.photoDataUrl){
    const hasCoords = it.x!=null && it.y!=null && it.w!=null && it.h!=null;
    const highlight = hasCoords
      ? `<div class="ph-box" style="left:${Math.max(0,it.x-it.w/2)}%;top:${Math.max(0,it.y-it.h/2)}%;width:${it.w}%;height:${it.h}%"></div>
         <div class="ph-label" style="left:${Math.max(0,it.x-it.w/2)}%;top:${Math.max(0,it.y-it.h/2-6)}%">${esc(it.name)}</div>`
      : '';
    heroHtml=`<div class="mhro"><img class="shelf-img" src="${it.photoDataUrl}"/><div class="movl"></div>${highlight}<button class="mcls" onclick="clsMod()">✕</button></div>`;
  }else{
    heroHtml=`<div class="mhro" style="height:100px"><div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:44px">💊</div><button class="mcls" onclick="clsMod()">✕</button></div>`;
  }

  if(editMode){
    mod(`${heroHtml}<div class="mbd">
      <div class="mbdg">✏️ Edit Item</div>
      <div style="font-size:11px;color:var(--t2);margin-bottom:12px">Correct any wrong details below</div>
      <div class="elbl">Medicine Name</div>
      <input class="einp" id="ei-name" value="${esc(it.name)}" placeholder="e.g. Crocin 500mg"/>
      <div class="elbl">Description</div>
      <input class="einp" id="ei-desc" value="${esc(it.description)}" placeholder="e.g. Fever and pain tablet"/>
      <div class="elbl">Shelf Location</div>
      <input class="einp" id="ei-loc" value="${esc(it.location)}" placeholder="e.g. Top shelf, left side"/>
      <button class="sbtn" onclick="saveEdit('${it.id}')">✓ Save Changes</button>
      <button class="cbtn" onclick="opIt('${it.id}')">Cancel</button>
    </div>`);
    return;
  }

  mod(`${heroHtml}<div class="mbd">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="mbdg">💊 Medicine</div>
      <button onclick="opIt('${it.id}',true)" style="background:none;border:1px solid var(--bd);color:var(--t2);border-radius:8px;padding:4px 9px;font-size:10px;cursor:pointer">✏️ Edit</button>
    </div>
    <div class="mnm">${esc(it.name)}</div>
    <div class="mds">${esc(it.description)}</div>
    <div class="lc">
      <div class="lcl">📍 Shelf Location</div>
      <div class="lcv">${esc(it.location)}</div>
      <div class="lcp">📷 ${esc(it.photoLabel)}</div>
    </div>
    <button class="dlb" onclick="delIt('${it.id}')">🗑 Remove</button>
  </div>`);
}

function opPh(id){
  const ph=photos.find(p=>p.id===id); if(!ph)return;
  const pi=items.filter(i=>i.photoId===id);
  mod(`<div class="mhro"><img class="shelf-img" src="${ph.dataUrl}"/><div class="movl"></div>
    <button class="mcls" onclick="clsMod()">✕</button>
    <div style="position:absolute;bottom:11px;left:13px"><div style="color:#fff;font-size:15px;font-weight:700">${esc(ph.label)}</div><div style="color:var(--green);font-size:10px">${ph.itemCount} items</div></div></div>
    <div class="mbd">
      <div class="slb">Items in this photo</div>
      ${pi.map(it=>`<div class="mit" onclick="clsMod();setTimeout(()=>opIt('${it.id}'),180)">
        <div style="min-width:0;flex:1"><div style="font-size:12px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(it.name)}</div>
        <div style="font-size:10px;color:var(--green);font-weight:600">📍 ${esc(it.location)}</div></div>
        <span style="color:#d1d5db;flex-shrink:0">›</span></div>`).join('')}
      <button class="dlb" onclick="delPh('${ph.id}')">🗑 Delete photo &amp; ${pi.length} items</button>
    </div>`);
}

function mod(h){ document.getElementById('mod').innerHTML=`<div class="mback" onclick="clsMod()"><div class="msh" onclick="event.stopPropagation()"><div class="mhnd"></div>${h}</div></div>`; }
function clsMod(){ document.getElementById('mod').innerHTML=''; }

function delIt(id){ if(!confirm('Remove?'))return; items=items.filter(i=>i.id!==id); persist();stats();clsMod();rS();rU(); }
function delPh(id){
  const n=items.filter(i=>i.photoId===id).length;
  if(!confirm(`Delete photo and ${n} items?`))return;
  photos=photos.filter(p=>p.id!==id); items=items.filter(i=>i.photoId!==id);
  persist();stats();clsMod();rG();rU();rS();
}
function saveEdit(id){
  const name=document.getElementById('ei-name').value.trim();
  const desc=document.getElementById('ei-desc').value.trim();
  const loc=document.getElementById('ei-loc').value.trim();
  if(!name){alert('Name cannot be empty');return;}
  const idx=items.findIndex(i=>i.id===id); if(idx===-1)return;
  items[idx]={...items[idx],name,description:desc,location:loc};
  persist();stats();clsMod();rS();rU();
  setTimeout(()=>opIt(id),200);
}

// ── Gemini API (via server proxy) ─────────────────────────────────────────────
async function gemini(prompt){
  const res=await fetch('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
  const d=await res.json();
  if(d.error)throw new Error(JSON.stringify(d.error));
  return d.candidates?.[0]?.content?.parts?.[0]?.text||'';
}
async function geminiVision(image_b64,prompt){
  const res=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_b64,prompt})});
  const d=await res.json();
  if(d.error)throw new Error(JSON.stringify(d.error));
  return d.candidates?.[0]?.content?.parts?.[0]?.text||'';
}

// ── Robust JSON parser ────────────────────────────────────────────────────────
function parseItems(raw){
  if(!raw)return[];
  const text=raw.replace(/```json|```/g,'').trim();
  // Try 1: full array
  const m=text.match(/\[[\s\S]*\]/);
  if(m){ try{ const r=JSON.parse(m[0]); if(Array.isArray(r)&&r.length)return r.filter(x=>x.name); }catch{} }
  // Try 2: repair cut-off JSON
  if(text.includes('"name"')){
    try{
      let t=text;
      const s=t.indexOf('['); if(s!==-1)t=t.slice(s); else t='['+t;
      let br=0,bk=0;
      for(const c of t){if(c==='{')br++;else if(c==='}')br--;else if(c==='[')bk++;else if(c===']')bk--;}
      t=t.replace(/,\s*"[^"]*$/,'').replace(/"[^"]*$/,'"unknown"');
      while(br>0){t+='}';br--;} while(bk>0){t+=']';bk--;}
      const r=JSON.parse(t); if(Array.isArray(r)&&r.length)return r.filter(x=>x.name);
    }catch{}
  }
  // Try 3: extract fields directly
  if(text.includes('"name"')){
    const names=[...text.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m=>m[1]);
    const descs=[...text.matchAll(/"description"\s*:\s*"([^"]+)"/g)].map(m=>m[1]);
    const locs=[...text.matchAll(/"location"\s*:\s*"([^"]+)"/g)].map(m=>m[1]);
    const xs=[...text.matchAll(/"x"\s*:\s*(\d+)/g)].map(m=>+m[1]);
    const ys=[...text.matchAll(/"y"\s*:\s*(\d+)/g)].map(m=>+m[1]);
    const ws=[...text.matchAll(/"w"\s*:\s*(\d+)/g)].map(m=>+m[1]);
    const hs=[...text.matchAll(/"h"\s*:\s*(\d+)/g)].map(m=>+m[1]);
    if(names.length)return names.map((n,i)=>({name:n,description:descs[i]||'Medicine',location:locs[i]||'shelf',x:xs[i]||null,y:ys[i]||null,w:ws[i]||null,h:hs[i]||null}));
  }
  return[];
}

// ── Image compression ─────────────────────────────────────────────────────────
function compress(file){
  return new Promise((res,rej)=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.width,h=img.height,M=1200;
      if(w>M||h>M){if(w>h){h=Math.round(h*M/w);w=M;}else{w=Math.round(w*M/h);h=M;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=c.toDataURL('image/jpeg',.82);
      res({b64:dataUrl.split(',')[1],dataUrl});
    };
    img.onerror=rej;img.src=url;
  });
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function hide(id){document.getElementById(id).style.display='none';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function emp(icon,title,text,btn,action){
  return`<div class="emp"><div class="eic">${icon}</div><div class="eti">${title}</div><div class="etx">${text}</div>${btn?`<button class="ebt" onclick="${action}">${btn}</button>`:''}</div>`;
}
