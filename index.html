<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0c1120"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MedLocate"/>
<title>MedLocate</title>
<style>
:root{
  --bg:#0c1120;--green:#10b981;--gl:#ecfdf5;--gm:#d1fae5;--gd:#065f46;
  --tx:#0f172a;--t2:#475569;--t3:#94a3b8;--bd:#e2e8f0;--red:#ef4444;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:system-ui,-apple-system,sans-serif;color:var(--tx)}
input,button,select{font-family:inherit}
::-webkit-scrollbar{display:none}
body{display:flex;align-items:center;justify-content:center}
#app{width:100%;max-width:430px;height:100vh;height:100dvh;display:flex;flex-direction:column;background:#f1f5f9;position:relative;overflow:hidden}
.hdr{background:linear-gradient(160deg,#0c1120,#0f2744);padding:calc(var(--st)+12px) 16px 12px;flex-shrink:0}
.eye{color:var(--green);font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:1px}
.htit{color:#f1f5f9;font-size:19px;font-weight:300}
.hsub{color:#64748b;font-size:11px;margin-top:2px}
.chips{display:flex;gap:6px;margin-top:9px;align-items:center}
.chip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:4px 10px;text-align:center}
.chipv{color:var(--green);font-size:15px;font-weight:700;line-height:1}
.chipl{color:#64748b;font-size:9px;text-transform:uppercase;letter-spacing:.8px}
.hbtn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:4px 9px;color:#94a3b8;font-size:10px;cursor:pointer;white-space:nowrap;margin-left:auto}
.sbar{background:linear-gradient(160deg,#0c1120,#0f2744);padding:0 12px 12px;display:flex;gap:7px;flex-shrink:0}
.sw{flex:1;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.1);border-radius:11px;padding:9px 11px;display:flex;align-items:center;gap:6px;min-width:0}
.sw:focus-within{border-color:rgba(16,185,129,.5)}
.sw input{flex:1;background:transparent;border:none;outline:none;color:#f1f5f9;font-size:14px;min-width:0;width:0}
.sfnd{background:var(--green);color:#fff;border:none;border-radius:11px;padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
.scr{flex:1;overflow-y:auto;overflow-x:hidden;padding:11px;-webkit-overflow-scrolling:touch}
.card{background:#fff;border-radius:13px;padding:10px;margin-bottom:8px;display:flex;align-items:center;gap:9px;border:1.5px solid var(--bd);cursor:pointer;transition:border-color .2s,background .15s;position:relative;overflow:hidden}
.card:active{background:var(--gl)}
.card.hit{border-color:var(--green);background:var(--gl);animation:pulse 1s ease 2}
.cth{width:48px;height:48px;border-radius:8px;flex-shrink:0;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
.cth img{width:100%;height:100%;object-fit:cover}
.ci{flex:1;min-width:0}
.cn{font-size:13px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.cd{font-size:10px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.cl{font-size:10px;color:var(--green);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cbadge{position:absolute;top:5px;right:5px;background:var(--green);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px}
.slb{color:var(--t3);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.emp{text-align:center;padding:36px 16px;animation:fup .4s ease}
.eic{font-size:46px;margin-bottom:10px}
.eti{font-size:17px;font-weight:600;color:var(--tx);margin-bottom:6px}
.etx{font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:18px}
.ebt{background:var(--bg);color:var(--green);border:none;border-radius:11px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer}
.dz{background:linear-gradient(135deg,var(--gl),var(--gm));border:2px dashed var(--green);border-radius:15px;padding:26px 16px;text-align:center;cursor:pointer;margin-bottom:10px}
.dz:active{opacity:.85}
.shelf-pick{background:#fff;border-radius:12px;padding:12px 14px;border:1px solid var(--bd);margin-bottom:10px}
.shelf-pick label{font-size:11px;color:var(--t2);display:block;margin-bottom:6px;font-weight:600}
.shelf-sel{width:100%;background:#f8fafc;border:1.5px solid var(--bd);border-radius:9px;padding:9px 11px;font-size:13px;color:var(--tx);outline:none}
.shelf-sel:focus{border-color:var(--green)}
.tips{background:#fff;border-radius:12px;padding:11px 13px;border:1px solid var(--bd);margin-bottom:10px}
.tip{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2);margin-bottom:4px}
.tip:last-child{margin-bottom:0}
.tdot{width:4px;height:4px;border-radius:50%;background:var(--green);flex-shrink:0}
.prow{background:#fff;border-radius:11px;padding:8px 10px;margin-bottom:6px;display:flex;align-items:center;gap:9px;cursor:pointer;border:1px solid var(--bd)}
.prow:active{background:var(--gl)}
.prow img{width:40px;height:40px;border-radius:6px;object-fit:cover;flex-shrink:0}
.prg{background:#fff;border-radius:15px;padding:28px 18px;text-align:center}
.pspin{font-size:36px;display:inline-block;animation:spin 1.4s linear infinite;margin-bottom:10px}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.gc{border-radius:11px;overflow:hidden;aspect-ratio:1;position:relative;cursor:pointer;background:var(--bd)}
.gc:active{opacity:.85}
.gc img{width:100%;height:100%;object-fit:cover}
.gol{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.72));padding:16px 8px 7px}
.glb{color:#fff;font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gcn{color:var(--green);font-size:9px}
.dots{display:flex;justify-content:center;gap:6px;margin-bottom:10px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:bnc .8s ease infinite alternate}
#nav{background:#fff;border-top:1px solid var(--bd);display:flex;padding:5px 0 calc(var(--sb)+5px);flex-shrink:0;position:relative}
.nb{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.nb:active{transform:scale(.88)}
.ndot{width:3px;height:3px;border-radius:50%;background:var(--green);display:none}
#wm{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--green);opacity:.5;letter-spacing:.5px;pointer-events:none;font-weight:600;white-space:nowrap;background:#fff;padding:1px 7px;border-radius:99px;border:1px solid rgba(16,185,129,.2)}
.mback{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;z-index:100;backdrop-filter:blur(4px);animation:fi .2s ease}
.msh{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:92%;overflow-y:auto;animation:su .25s cubic-bezier(.34,1.56,.64,1);padding-bottom:calc(var(--sb)+14px)}
.mhnd{width:30px;height:4px;background:var(--bd);border-radius:99px;margin:9px auto 0}
.mhro{position:relative;background:#0a0a1a;overflow:hidden;margin-top:7px;flex-shrink:0}
.simg{width:100%;max-height:240px;object-fit:contain;display:block}
.ph-box{position:absolute;border:3px solid #facc15;border-radius:5px;background:rgba(250,204,21,.15);pointer-events:none;display:none}
.ph-pin{position:absolute;background:#facc15;color:#000;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;pointer-events:none;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;display:none}
.mcls{position:absolute;top:9px;right:9px;background:rgba(0,0,0,.5);border:none;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:13px;z-index:2}
.mbd{padding:13px 15px}
.mbdg{display:inline-flex;align-items:center;background:var(--gl);color:#059669;font-size:9px;font-weight:700;padding:3px 8px;border-radius:99px;margin-bottom:7px;text-transform:uppercase;letter-spacing:1px}
.mnm{font-size:18px;font-weight:700;color:var(--tx);margin-bottom:3px;word-break:break-word}
.mds{font-size:11px;color:var(--t2);line-height:1.5;margin-bottom:11px}
.lc{background:linear-gradient(135deg,var(--gl),var(--gm));border-radius:11px;padding:11px 13px;border:1px solid #a7f3d0;margin-bottom:11px}
.lcl{color:var(--gd);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.lcv{font-size:14px;color:var(--tx);font-weight:700;margin-bottom:2px;word-break:break-word}
.lcp{font-size:10px;color:#6b7280}
.dlb{width:100%;background:none;border:1px solid #fca5a5;color:var(--red);border-radius:11px;padding:10px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:5px}
.dlb:active{background:#fef2f2}
.mit{background:#f8fafc;border-radius:9px;padding:8px 11px;margin-bottom:5px;cursor:pointer;border:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.mit:active{background:var(--gl)}
.elbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;font-weight:600}
.einp{width:100%;background:#f8fafc;border:1.5px solid var(--bd);border-radius:9px;padding:8px 10px;font-size:13px;color:var(--tx);outline:none;margin-bottom:9px}
.einp:focus{border-color:var(--green)}
.sbtn{width:100%;background:var(--green);color:#fff;border:none;border-radius:11px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:6px}
.sbtn:active{background:#059669}
.cbtn{width:100%;background:none;border:1px solid var(--bd);color:var(--t2);border-radius:11px;padding:10px;font-size:12px;cursor:pointer}
#aks{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:24px 22px}
#aks.show{display:flex}
.akw{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:11px;padding:11px 13px;display:flex;align-items:center;gap:8px;margin-bottom:8px}
.akw:focus-within{border-color:rgba(16,185,129,.5)}
.akw input{flex:1;background:transparent;border:none;outline:none;color:#f1f5f9;font-size:13px;font-family:monospace;min-width:0}
.aksv{width:100%;background:var(--green);color:#fff;border:none;border-radius:11px;padding:12px;font-size:14px;font-weight:700;cursor:pointer}
.rawbox{background:#0c1120;border-radius:9px;padding:9px;margin-bottom:9px}
.rawtxt{color:var(--green);font-size:9px;font-family:monospace;line-height:1.5;white-space:pre-wrap;word-break:break-all;max-height:100px;overflow-y:auto}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes bnc{from{transform:translateY(0)}to{transform:translateY(-6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}50%{box-shadow:0 0 0 8px rgba(16,185,129,0)}}
@media(min-width:500px){body{background:#060b14}#app{border-radius:36px;height:92vh;max-height:860px;box-shadow:0 0 0 1px #1e293b,0 40px 80px rgba(0,0,0,.7)}}
</style>
</head>
<body>
<div id="app">

  <div id="aks">
    <div style="font-size:48px;margin-bottom:10px">💊</div>
    <div style="font-size:20px;font-weight:300;color:#f1f5f9;margin-bottom:3px">MedLocate</div>
    <div style="font-size:11px;color:#64748b;text-align:center;line-height:1.6;margin-bottom:20px">Enter your FREE Gemini API key.<br/>Saved permanently — asked only once.</div>
    <div class="akw">
      <span style="color:#64748b;font-size:13px">🔑</span>
      <input type="password" id="aki" placeholder="AIzaSy…" autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter')saveKey()"/>
      <button onclick="toggleVis()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:13px;flex-shrink:0">👁</button>
    </div>
    <button class="aksv" onclick="saveKey()">Save & Continue →</button>
    <div id="ake" style="color:var(--red);font-size:11px;text-align:center;margin-top:6px;min-height:14px"></div>
    <div style="font-size:10px;color:#475569;text-align:center;margin-top:10px">Get free key → <a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--green)">aistudio.google.com/apikey</a></div>
    <button id="akskip" onclick="skipKey()" style="display:none;background:none;border:none;color:#475569;font-size:11px;cursor:pointer;margin-top:12px;text-decoration:underline">Skip (use saved key)</button>
  </div>

  <div id="ps" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <div class="hdr">
      <div class="eye">✚ MedLocate</div>
      <div class="htit">Find Medicine</div>
      <div class="chips">
        <div class="chip"><div class="chipv" id="si">0</div><div class="chipl">Items</div></div>
        <div class="chip"><div class="chipv" id="sp">0</div><div class="chipl">Photos</div></div>
        <button class="hbtn" onclick="showKey()">🔑 Key</button>
        <button class="hbtn" onclick="showSync()" style="color:#10b981;border-color:rgba(16,185,129,.3)">🔄 Sync</button>
      </div>
    </div>
    <div class="sbar">
      <div class="sw">
        <span style="color:#64748b;font-size:13px;flex-shrink:0">🔍</span>
        <input type="text" id="sq" placeholder="Type any part of name…" onkeydown="if(event.key==='Enter')doSearch()" oninput="onType(this)"/>
        <button id="xb" onclick="clrSearch()" style="display:none;background:none;border:none;color:#64748b;cursor:pointer;font-size:12px;flex-shrink:0">✕</button>
      </div>
      <button class="sfnd" onclick="doSearch()">Find</button>
    </div>
    <div id="sugg" style="display:none;background:linear-gradient(160deg,#0c1120,#0f2744);padding:0 12px 8px;flex-shrink:0">
      <div id="sugg-list" style="display:flex;flex-wrap:wrap;gap:5px"></div>
    </div>
    <div class="scr" id="sa"></div>
  </div>

  <div id="pu" style="flex:1;display:none;flex-direction:column;overflow:hidden">
    <div class="hdr">
      <div class="eye">✚ MedLocate</div>
      <div class="htit">Add Photos</div>
      <div class="hsub">AI reads every medicine label</div>
    </div>
    <div class="scr" id="ua"></div>
  </div>

  <div id="pg" style="flex:1;display:none;flex-direction:column;overflow:hidden">
    <div class="hdr">
      <div class="eye">✚ MedLocate</div>
      <div class="htit">Gallery</div>
      <div class="hsub" id="gs">0 photos</div>
    </div>
    <div class="scr" id="ga"></div>
  </div>

  <nav id="nav">
    <button class="nb" id="n0" onclick="tab('s')"><span style="font-size:19px">🔍</span><span id="l0" style="font-size:9px;color:var(--green);font-weight:700">Search</span><span class="ndot" id="d0" style="display:block"></span></button>
    <button class="nb" id="n1" onclick="tab('u')"><span style="font-size:19px">📷</span><span id="l1" style="font-size:9px;color:var(--t3)">Upload</span><span class="ndot" id="d1"></span></button>
    <button class="nb" id="n2" onclick="tab('g')"><span style="font-size:19px">🗂️</span><span id="l2" style="font-size:9px;color:var(--t3)">Gallery</span><span class="ndot" id="d2"></span></button>
    <div id="wm">by Mirza Faizan</div>
  </nav>
</div>

<div id="mod"></div>
<input type="file" id="fi" accept="image/*" multiple style="display:none" onchange="onFiles(this)"/>
<input type="hidden" id="cur-shelf" value=""/>

<script>
var items  = JSON.parse(localStorage.getItem('ml_i') || '[]');
var photos = JSON.parse(localStorage.getItem('ml_p') || '[]');
var sr = null;

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', function() {
  fetch('/api/status').then(function(r){ return r.json(); }).then(function(d){
    if(d.hasKey){ boot(); }
    else{ showAks(); }
  }).catch(function(){
    document.getElementById('ake').textContent='⚠ Cannot reach server';
    showAks();
  });
});

function showAks(){
  var saved=localStorage.getItem('ml_k');
  if(saved){ document.getElementById('aki').value=saved; document.getElementById('akskip').style.display='block'; }
  document.getElementById('aks').classList.add('show');
}

function boot(){
  var sid=localStorage.getItem('ml_store_id');
  if(sid){ syncLoad(sid).finally(function(){ stats();rS();rU();rG(); }); }
  else{ stats();rS();rU();rG(); }
}

// ── API Key ───────────────────────────────────────────────────────────────────
function toggleVis(){
  var i=document.getElementById('aki');
  i.type=i.type==='password'?'text':'password';
}
function showKey(){
  var s=localStorage.getItem('ml_k')||'';
  document.getElementById('aki').value=s;
  document.getElementById('akskip').style.display=s?'block':'none';
  document.getElementById('aks').classList.add('show');
}
function skipKey(){
  document.getElementById('aks').classList.remove('show');
  boot();
}
function saveKey(){
  var k=document.getElementById('aki').value.trim();
  var e=document.getElementById('ake');
  if(k.length<20){ e.textContent='Key too short'; return; }
  e.textContent='Saving…';
  fetch('/api/key',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:k})})
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.error){ e.textContent='❌ '+d.error; return; }
      localStorage.setItem('ml_k',k);
      document.getElementById('aks').classList.remove('show');
      boot();
    })
    .catch(function(ex){ e.textContent='❌ '+ex.message; });
}

// ── Persist ───────────────────────────────────────────────────────────────────
function persist(){
  localStorage.setItem('ml_i',JSON.stringify(items));
  localStorage.setItem('ml_p',JSON.stringify(photos));
  var sid=localStorage.getItem('ml_store_id');
  if(sid){ syncSave(sid); }
}
function stats(){
  document.getElementById('si').textContent=items.length;
  document.getElementById('sp').textContent=photos.length;
  document.getElementById('gs').textContent=photos.length+' photo'+(photos.length!==1?'s':'')+' · '+items.length+' items';
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function tab(t){
  ['s','u','g'].forEach(function(id,i){
    var pages={'s':'ps','u':'pu','g':'pg'};
    var on=id===t;
    document.getElementById(pages[id]).style.display=on?'flex':'none';
    document.getElementById('l'+i).style.color=on?'var(--green)':'var(--t3)';
    document.getElementById('l'+i).style.fontWeight=on?'700':'400';
    document.getElementById('d'+i).style.display=on?'block':'none';
  });
  if(t==='u') rU();
  if(t==='g') rG();
}

// ── Search ────────────────────────────────────────────────────────────────────
function onType(inp){
  var v=inp.value.trim();
  document.getElementById('xb').style.display=v?'block':'none';
  if(!v){ sr=null; rS(); hideSugg(); return; }
  showSugg(v);
}
function showSugg(q){
  var matches=fuzzy(q,items);
  var sugg=document.getElementById('sugg');
  var list=document.getElementById('sugg-list');
  if(!matches.length){ sugg.style.display='none'; return; }
  sugg.style.display='block';
  list.innerHTML=matches.slice(0,5).map(function(it){
    return '<button onclick="qSearch(\''+esc(it.name)+'\')" style="background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);border-radius:99px;padding:4px 10px;color:#10b981;font-size:11px;cursor:pointer;white-space:nowrap">'+esc(it.name)+'</button>';
  }).join('');
}
function hideSugg(){ document.getElementById('sugg').style.display='none'; }
function qSearch(name){ document.getElementById('sq').value=name; hideSugg(); doSearch(); }

function fuzzy(q,list){
  var lq=q.toLowerCase().trim();
  var words=lq.split(/\s+/);
  return list.filter(function(it){
    var hay=(it.name+' '+it.description+' '+it.location).toLowerCase();
    return words.every(function(w){ return hay.includes(w); });
  }).sort(function(a,b){
    var an=a.name.toLowerCase(), bn=b.name.toLowerCase();
    if(an.startsWith(lq)&&!bn.startsWith(lq)) return -1;
    if(!an.startsWith(lq)&&bn.startsWith(lq)) return 1;
    return 0;
  });
}

function clrSearch(){
  document.getElementById('sq').value='';
  document.getElementById('xb').style.display='none';
  hideSugg(); sr=null; rS();
}

function doSearch(){
  var q=document.getElementById('sq').value.trim(); if(!q) return;
  hideSugg();
  var local=fuzzy(q,items);
  if(local.length){ sr=local; rS(); return; }
  sr='loading'; rS();
  var prompt='Inventory:\n'+items.map(function(i){ return 'ID:'+i.id+' NAME:'+i.name+' DESC:'+i.description; }).join('\n')+'\n\nSearch: "'+q+'"\nReturn ONLY JSON array of matching IDs:\n["id1"]\nReturn [] if none.';
  gemini(prompt).then(function(txt){
    var clean=txt.replace(/```json|```/g,'').trim();
    var m=clean.match(/\[[\s\S]*\]/);
    var ids=m?JSON.parse(m[0]):[];
    sr=items.filter(function(i){ return ids.includes(i.id); });
    rS();
  }).catch(function(){ sr=[]; rS(); });
}

function rS(){
  var el=document.getElementById('sa');
  if(sr===null){
    if(!items.length){
      el.innerHTML=emp('🏪','Store is empty','Upload photos of your shelves to get started.','📷 Add Photos',"tab('u')");

      el.innerHTML='<div style="animation:fup .3s ease"><div class="slb">Recently Added</div>'+items.slice(-6).reverse().map(function(it){ return cH(it,null); }).join('')+'</div>';

  } else if(!sr.length){
    el.innerHTML=emp('🔍','Not found','Nothing matched "<b>'+esc(document.getElementById('sq').value)+'</b>".<br/>Try a shorter word or add more photos.');
  } else {
    var q=esc(document.getElementById('sq').value);
    el.innerHTML='<div style="animation:fup .3s ease"><div class="slb">'+sr.length+' match'+(sr.length!==1?'es':'')+' for "'+q+'"</div>'+sr.map(function(it,i){ return cH(it,i+1); }).join('')+'</div>';
    setTimeout(function(){
      el.querySelectorAll('.card').forEach(function(c,i){
        setTimeout(function(){ c.classList.add('hit'); },i*100);
      });
    },60);
  }
}

function onFiles(input){
  var files=Array.from(input.files||[]); if(!files.length) return; input.value='';
  var shelf=document.getElementById('cur-shelf').value||'Unknown shelf';
  var el=document.getElementById('ua');

  function doFile(i){
    if(i>=files.length) return;
    var file=files[i];
    el.innerHTML='<div class="prg"><div class="pspin">⚙️</div>'+
      '<div style="font-size:16px;font-weight:600;color:var(--tx);margin-bottom:5px">Analyzing'+(files.length>1?' '+(i+1)+'/'+files.length:'')+'</div>'+
      '<div style="font-size:11px;color:#64748b;margin-bottom:4px">Shelf: <b>'+esc(shelf)+'</b></div>'+

      var b64=res.b64, dataUrl=res.dataUrl;

      var photoId='ph_'+Date.now()+'_'+i;
      var label=file.name.replace(/\.[^.]+$/,'');
      var prompt='You are scanning a pharmacy shelf photo. This is: "'+shelf+'".\n\nFor each medicine visible:\n- "name": SHORT brand+strength. E.g. "Polyclav 200mg/5ml", "Dolo 650". NOT long generic names.\n- "description": Very short. E.g. "Antibiotic syrup"\n- "location": Position in this shelf. E.g. "Left side", "Center front", "Right side back"\n- "x": item center horizontal % (0=left edge, 100=right edge)\n- "y": item center vertical % (0=top, 100=bottom)\n- "w": item width as % of full image width\n- "h": item height as % of full image height\n\nIMPORTANT: Do NOT add duplicates. Each medicine listed once only.\n\nReturn ONLY raw JSON array:\n[{"name":"Polyclav 200mg/5ml","description":"Antibiotic","location":"Left side","x":15,"y":50,"w":12,"h":35}]\n\nReturn [] if no medicine visible.';

      return geminiVision(b64,prompt).then(function(rawText){
        if(!rawText) throw new Error('Empty response');
        var found=parseItems(rawText);
        var existingNames=new Set(items.map(function(it){ return it.name.toLowerCase().trim(); }));
        var deduped=found.filter(function(p){
          var k=p.name.toLowerCase().trim();

        });

        photos.push({id:photoId,label:label,shelf:shelf,dataUrl:dataUrl,itemCount:deduped.length,addedAt:new Date().toISOString()});
        deduped.forEach(function(p){
          var id='it_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);

          items.push({id:id,name:p.name,description:p.description||'',location:fullLoc,
            x:p.x!=null?p.x:null,y:p.y!=null?p.y:null,w:p.w!=null?p.w:null,h:p.h!=null?p.h:null,
            photoId:photoId,photoLabel:label,photoDataUrl:dataUrl,addedAt:new Date().toISOString()});
        });
        persist(); stats();
        return new Promise(function(r){ setTimeout(r,300); }).then(function(){
          el.innerHTML=
            '<div style="background:#fff;border-radius:13px;padding:11px;margin-bottom:9px;border:1px solid var(--bd)">'+
            '<img src="'+dataUrl+'" style="width:100%;border-radius:7px;max-height:130px;object-fit:cover;margin-bottom:7px"/>'+
            '<div style="font-size:12px;font-weight:700;color:'+(deduped.length?'var(--tx)':'var(--red)')+';margin-bottom:4px">'+
            (deduped.length?'✅ Added '+deduped.length+' item'+(deduped.length!==1?'s':''):'⚠️ No new items (duplicates skipped)')+
            '</div>'+
            deduped.map(function(d){ return '<div style="font-size:10px;padding:2px 0;border-bottom:1px solid #f1f5f9;color:var(--green)">💊 <b>'+esc(d.name)+'</b> <span style="color:var(--t2)">— '+esc(d.location)+'</span></div>'; }).join('')+
            '</div>'+
            '<div class="rawbox"><div style="color:#475569;font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px">Gemini response</div><div class="rawtxt">'+esc(rawText)+'</div></div>'+
            '<button onclick="rU()" style="width:100%;background:#0f172a;color:#f1f5f9;border:none;border-radius:11px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:6px">← Upload Another</button>'+
            '<button onclick="tab(\'s\')" style="width:100%;background:var(--green);color:#fff;border:none;border-radius:11px;padding:10px;font-size:12px;font-weight:700;cursor:pointer">Go to Search →</button>';
        });
      });
    }).catch(function(e){
      el.innerHTML='<div style="background:#fff;border-radius:13px;padding:14px;margin-bottom:9px;border:1px solid #fca5a5;text-align:center">'+
        '<div style="font-size:28px;margin-bottom:7px">❌</div>'+
        '<div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:5px">Error</div>'+
        '<div style="font-size:10px;color:#64748b;font-family:monospace;background:#f8fafc;border-radius:6px;padding:7px;text-align:left;word-break:break-all;line-height:1.5">'+esc(e.message||String(e))+'</div></div>'+

    });
  }
  doFile(0);
}

// ── Correct highlight using actual rendered image bounds ──────────────────────
function posHL(itemId){
  var it=items.find(function(i){ return i.id===itemId; });
  if(!it||it.x==null||it.y==null||it.w==null||it.h==null) return;
  var img=document.getElementById('mhro-img');
  var box=document.getElementById('ph-box');
  var pin=document.getElementById('ph-pin');
  if(!img||!box||!pin) return;
  requestAnimationFrame(function(){
    var nW=img.naturalWidth, nH=img.naturalHeight;
    if(!nW||!nH) return;
    var rect=img.getBoundingClientRect();
    var cW=rect.width, cH=rect.height;
    var imgR=nW/nH, conR=cW/cH;
    var rW,rH,offX,offY;
    if(imgR>conR){ rW=cW; rH=cW/imgR; offX=0; offY=(cH-rH)/2; }
    else { rH=cH; rW=cH*imgR; offY=0; offX=(cW-rW)/2; }
    var cx=offX+(it.x/100)*rW;
    var cy=offY+(it.y/100)*rH;
    var bw=(it.w/100)*rW;
    var bh=(it.h/100)*rH;
    var L=Math.max(0,cx-bw/2);
    var T=Math.max(0,cy-bh/2);
    box.style.cssText='display:block;position:absolute;left:'+L+'px;top:'+T+'px;width:'+bw+'px;height:'+bh+'px;border:3px solid #facc15;border-radius:5px;background:rgba(250,204,21,.15);pointer-events:none';
    pin.style.cssText='display:block;position:absolute;left:'+L+'px;top:'+Math.max(0,T-20)+'px;background:#facc15;color:#000;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;pointer-events:none;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis';
  });
}

}

function doPull(){
  var raw=document.getElementById('sync-id').value.trim();
  var id=raw.replace(/[^a-zA-Z0-9\-_]/g,'');
  if(!id||id.length<3){ alert('Enter a Store ID first'); return; }

  btn.textContent='Pulling…'; btn.disabled=true;
  localStorage.setItem('ml_store_id',id);
  fetch('/api/sync/'+encodeURIComponent(id))
    .then(function(r){ if(!r.ok) throw new Error('Store ID not found'); return r.json(); })
    .then(function(d){
      var ni=d.items||[], np=d.photos||[];
      if(!ni.length&&!np.length){ alert('No data found for this Store ID.\nPush from the other device first.'); btn.textContent='⬇ Pull from Cloud'; btn.disabled=false; return; }
      items=ni; photos=np;
      localStorage.setItem('ml_i',JSON.stringify(items));
      localStorage.setItem('ml_p',JSON.stringify(photos));
      stats();rS();rG();rU();clsMod();
      alert('✅ Pulled! '+items.length+' items, '+photos.length+' photos loaded.');
    }).catch(function(e){
      alert('Error: '+e.message);
      btn.textContent='⬇ Pull from Cloud'; btn.disabled=false;
    });
}

// ── Gemini API ────────────────────────────────────────────────────────────────
function gemini(prompt){
  return fetch('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt})})
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.error) throw new Error(JSON.stringify(d.error));
      return (d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts&&d.candidates[0].content.parts[0]&&d.candidates[0].content.parts[0].text)||'';
    });
}
function geminiVision(b64,prompt){
  return fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_b64:b64,prompt:prompt})})
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.error) throw new Error(JSON.stringify(d.error));
      return (d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts&&d.candidates[0].content.parts[0]&&d.candidates[0].content.parts[0].text)||'';
    });
}

// ── JSON Parser ───────────────────────────────────────────────────────────────
function parseItems(raw){
  if(!raw) return [];
  var text=raw.replace(/```json|```/g,'').trim();
  var m=text.match(/\[[\s\S]*\]/);
  if(m){ try{ var r=JSON.parse(m[0]); if(Array.isArray(r)&&r.length) return r.filter(function(x){ return x.name; }); }catch(e){} }
  if(text.indexOf('"name"')!==-1){
    try{
      var t=text;
      var s=t.indexOf('['); if(s!==-1) t=t.slice(s); else t='['+t;
      var br=0,bk=0;
      for(var c=0;c<t.length;c++){
        if(t[c]==='{') br++; else if(t[c]==='}') br--;
        else if(t[c]==='[') bk++; else if(t[c]===']') bk--;
      }
      t=t.replace(/,\s*"[^"]*$/,'').replace(/"[^"]*$/,'"?"');
      while(br>0){t+='}';br--;} while(bk>0){t+=']';bk--;}
      var r2=JSON.parse(t); if(Array.isArray(r2)&&r2.length) return r2.filter(function(x){ return x.name; });
    }catch(e){}
    var names=Array.from(text.matchAll(/"name"\s*:\s*"([^"]+)"/g)).map(function(m){ return m[1]; });
    var descs=Array.from(text.matchAll(/"description"\s*:\s*"([^"]+)"/g)).map(function(m){ return m[1]; });
    var locs=Array.from(text.matchAll(/"location"\s*:\s*"([^"]+)"/g)).map(function(m){ return m[1]; });
    var xs=Array.from(text.matchAll(/"x"\s*:\s*(\d+(?:\.\d+)?)/g)).map(function(m){ return +m[1]; });
    var ys=Array.from(text.matchAll(/"y"\s*:\s*(\d+(?:\.\d+)?)/g)).map(function(m){ return +m[1]; });
    var ws=Array.from(text.matchAll(/"w"\s*:\s*(\d+(?:\.\d+)?)/g)).map(function(m){ return +m[1]; });
    var hs=Array.from(text.matchAll(/"h"\s*:\s*(\d+(?:\.\d+)?)/g)).map(function(m){ return +m[1]; });
    if(names.length) return names.map(function(n,i){ return {name:n,description:descs[i]||'Medicine',location:locs[i]||'shelf',x:xs[i]!=null?xs[i]:null,y:ys[i]!=null?ys[i]:null,w:ws[i]!=null?ws[i]:null,h:hs[i]!=null?hs[i]:null}; });
  }
  return [];
}

// ── Image Compression ─────────────────────────────────────────────────────────
function compress(file){
  return new Promise(function(resolve,reject){
    var img=new Image(), url=URL.createObjectURL(file);
    img.onload=function(){
      URL.revokeObjectURL(url);
      var w=img.width, h=img.height, M=1200;
      if(w>M||h>M){ if(w>h){h=Math.round(h*M/w);w=M;}else{w=Math.round(w*M/h);h=M;} }
      var c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      var dataUrl=c.toDataURL('image/jpeg',.82);
      resolve({b64:dataUrl.split(',')[1],dataUrl:dataUrl});
    };
    img.onerror=reject; img.src=url;
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function emp(icon,title,text,btn,action){
  return '<div class="emp"><div class="eic">'+icon+'</div><div class="eti">'+title+'</div><div class="etx">'+text+'</div>'+(btn?'<button class="ebt" onclick="'+action+'">'+btn+'</button>':'')+'</div>';
}
